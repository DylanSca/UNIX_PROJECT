services:
  web:
    build: .
    container_name: bLeague_web
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - db
      - redis

  db:
    image: mariadb:latest
    container_name: bLeague_db
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: bLeague
    ports:
      - "3307:3306"
    volumes:
      - "./db/init.sql:/docker-entrypoint-initdb.d/init.sql"

  redis:
    image: redis:latest
    container_name: bLeague_redis
    ports:
      - "6380:6379"

